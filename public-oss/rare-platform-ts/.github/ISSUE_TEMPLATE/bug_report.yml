name: Bug report
description: Report a reproducible platform kit bug
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What broke and what did you expect instead?
    validations:
      required: true
  - type: input
    id: package
    attributes:
      label: Package
      description: Which package is affected?
      placeholder: @rare-id/platform-kit-web
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Include the minimal code path, framework, and configuration needed to reproduce the issue
    validations:
      required: true
  - type: textarea
    id: security
    attributes:
      label: Verification or security impact
      description: Does this affect challenge validation, token verification, replay handling, or sessions?
