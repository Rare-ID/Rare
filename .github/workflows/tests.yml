name: tests

on:
  push:
  pull_request:

jobs:
  python-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Validate RIP docs
        run: python scripts/validate_rip_docs.py --strict

      - name: Check repo hygiene
        run: python scripts/check_repo_hygiene.py

      - name: Install dependencies
        run: |
          python -m pip install -U pip setuptools wheel
          python -m pip install pytest-cov
          python -m pip install -e "./packages/python/rare-identity-protocol-python[test]" --no-deps
          python -m pip install -e "./packages/python/rare-identity-verifier-python[test]" --no-deps
          python -m pip install -r ./packages/python/rare-identity-protocol-python/requirements-test.lock
          python -m pip install -r ./packages/python/rare-identity-verifier-python/requirements-test.lock
          python -m pip install -r ./services/rare-identity-core/requirements-test.lock
          python -m pip install -r ./packages/python/rare-agent-sdk-python/requirements-test.lock
          python -m pip install -e "./services/rare-identity-core[test]" --no-deps
          python -m pip install -e "./packages/python/rare-agent-sdk-python[test]" --no-deps

      - name: Run coverage gates
        run: ./scripts/test_cov_all.sh

      - name: Compile check
        run: python -m compileall packages/python/rare-identity-protocol-python packages/python/rare-identity-verifier-python services/rare-identity-core packages/python/rare-agent-sdk-python

  python-audit:
    runs-on: ubuntu-latest
    needs: python-test
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Run pip-audit
        run: |
          python -m pip install -U pip
          ./scripts/audit_deps.sh
