name: deploy-rare-core

on:
  workflow_dispatch:

concurrency:
  group: deploy-rare-core-prod
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: prod
    permissions:
      contents: read
      id-token: write
    env:
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      GCP_REGION: ${{ vars.GCP_REGION }}
      CLOUD_RUN_SERVICE: ${{ vars.CLOUD_RUN_SERVICE }}
      ARTIFACT_REGISTRY_REPOSITORY: ${{ vars.ARTIFACT_REGISTRY_REPOSITORY }}
      WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
      SERVICE_ACCOUNT_EMAIL: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}
    steps:
      - uses: actions/checkout@v6

      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.SERVICE_ACCOUNT_EMAIL }}
          project_id: ${{ env.GCP_PROJECT_ID }}

      - uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Validate Deploy Configuration
        run: |
          test -n "${GCP_PROJECT_ID}"
          test -n "${GCP_REGION}"
          test -n "${CLOUD_RUN_SERVICE}"
          test -n "${ARTIFACT_REGISTRY_REPOSITORY}"
          test -n "${WORKLOAD_IDENTITY_PROVIDER}"
          test -n "${SERVICE_ACCOUNT_EMAIL}"

      - name: Configure Docker Auth
        run: gcloud auth configure-docker "${GCP_REGION}-docker.pkg.dev" --quiet

      - name: Build Image
        env:
          IMAGE_URI: ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REGISTRY_REPOSITORY }}/rare-core-api:${{ github.sha }}
        run: |
          docker build -f services/rare-identity-core/Dockerfile -t "${IMAGE_URI}" .
          docker push "${IMAGE_URI}"
          echo "IMAGE_URI=${IMAGE_URI}" >> "$GITHUB_ENV"

      - name: Deploy Cloud Run Revision
        run: |
          gcloud run deploy "${CLOUD_RUN_SERVICE}" \
            --project "${GCP_PROJECT_ID}" \
            --region "${GCP_REGION}" \
            --image "${IMAGE_URI}" \
            --quiet

      - name: Deployment Summary
        run: |
          echo "Deployed ${IMAGE_URI} to ${CLOUD_RUN_SERVICE} in ${GCP_PROJECT_ID}/${GCP_REGION}"
