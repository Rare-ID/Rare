name: publish-platform-kit-ts

on:
  push:
    branches:
      - main
    paths:
      - "rare-platform-kit-ts/**"
      - ".github/workflows/publish-platform-kit-ts.yml"
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish after build"
        required: true
        default: false
        type: boolean

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rare-platform-kit-ts
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: pnpm
          cache-dependency-path: rare-platform-kit-ts/pnpm-lock.yaml
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Build
        run: pnpm -r build
      - name: Lint
        run: pnpm -r lint
      - name: Typecheck
        run: pnpm -r typecheck
      - name: Test
        run: pnpm -r test
      - name: Pack
        run: |
          mkdir -p .artifacts
          for pkg in packages/*; do
            (cd "$pkg" && pnpm pack --pack-destination ../../.artifacts)
          done
      - name: Upload tarballs
        uses: actions/upload-artifact@v4
        with:
          name: platform-kit-ts-tarballs
          path: rare-platform-kit-ts/.artifacts/*.tgz

  publish:
    if: github.event_name == 'push' || github.event.inputs.publish == 'true'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: rare-platform-kit-ts
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: pnpm
          cache-dependency-path: rare-platform-kit-ts/pnpm-lock.yaml
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Build
        run: pnpm -r build
      - name: Publish packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: pnpm -r publish --access public --no-git-checks
