name: publish-python-packages

on:
  push:
    branches:
      - main
    paths:
      - "packages/python/rare-agent-sdk-python/**"
      - ".github/workflows/publish-python-packages.yml"
  workflow_dispatch:
    inputs:
      target:
        description: "Package set to publish"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - rare-identity-verifier
          - rare-identity-core
          - rare-agent-sdk
      repository:
        description: "PyPI repository"
        required: true
        default: "testpypi"
        type: choice
        options:
          - testpypi
          - pypi
      publish:
        description: "Publish after build"
        required: true
        default: false
        type: boolean

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 1
      matrix:
        package:
          - name: rare-identity-verifier
            path: packages/python/rare-identity-verifier-python
          - name: rare-identity-core
            path: services/rare-identity-core
          - name: rare-agent-sdk
            path: packages/python/rare-agent-sdk-python
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Filter matrix
        id: filter
        run: |
          pkg='${{ matrix.package.name }}'
          if [ "${{ github.event_name }}" = "push" ]; then
            case "$pkg" in
              rare-agent-sdk)
                echo "selected=true" >> "$GITHUB_OUTPUT"
                ;;
              *)
                echo "selected=false" >> "$GITHUB_OUTPUT"
                ;;
            esac
          else
            target='${{ github.event.inputs.target }}'
            if [ "$target" = "all" ] || [ "$target" = "$pkg" ]; then
              echo "selected=true" >> "$GITHUB_OUTPUT"
            else
              echo "selected=false" >> "$GITHUB_OUTPUT"
            fi
          fi
      - name: Install build tooling
        if: steps.filter.outputs.selected == 'true'
        run: python -m pip install -U build twine
      - name: Build distributions
        if: steps.filter.outputs.selected == 'true'
        working-directory: ${{ matrix.package.path }}
        run: python -m build
      - name: Check distributions
        if: steps.filter.outputs.selected == 'true'
        run: python -m twine check ${{ matrix.package.path }}/dist/*
      - name: Upload distributions
        if: steps.filter.outputs.selected == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.package.name }}-dist
          path: ${{ matrix.package.path }}/dist/*

  publish:
    if: github.event_name == 'push' || github.event.inputs.publish == 'true'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    environment: ${{ github.event_name == 'push' && format('pypi-{0}', matrix.package.name) || (github.event.inputs.repository == 'pypi' && format('pypi-{0}', matrix.package.name) || github.event.inputs.repository) }}
    strategy:
      max-parallel: 1
      matrix:
        package:
          - name: rare-identity-verifier
          - name: rare-identity-core
          - name: rare-agent-sdk
    steps:
      - name: Filter matrix
        id: filter
        run: |
          pkg='${{ matrix.package.name }}'
          if [ "${{ github.event_name }}" = "push" ]; then
            case "$pkg" in
              rare-agent-sdk)
                echo "selected=true" >> "$GITHUB_OUTPUT"
                ;;
              *)
                echo "selected=false" >> "$GITHUB_OUTPUT"
                ;;
            esac
          else
            target='${{ github.event.inputs.target }}'
            if [ "$target" = "all" ] || [ "$target" = "$pkg" ]; then
              echo "selected=true" >> "$GITHUB_OUTPUT"
            else
              echo "selected=false" >> "$GITHUB_OUTPUT"
            fi
          fi
      - name: Download distributions
        if: steps.filter.outputs.selected == 'true'
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.package.name }}-dist
          path: dist
      - name: Publish to TestPyPI
        if: steps.filter.outputs.selected == 'true' && github.event_name == 'workflow_dispatch' && github.event.inputs.repository == 'testpypi'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist
          skip-existing: true
      - name: Publish to PyPI
        if: steps.filter.outputs.selected == 'true' && (github.event_name == 'push' || github.event.inputs.repository == 'pypi')
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          skip-existing: true
