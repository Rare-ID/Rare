name: publish-python-packages

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Package set to publish"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - rare-identity-protocol
          - rare-identity-verifier
          - rare-identity-core
          - rare-agent-sdk
      repository:
        description: "PyPI repository"
        required: true
        default: "testpypi"
        type: choice
        options:
          - testpypi
          - pypi
      publish:
        description: "Publish after build"
        required: true
        default: false
        type: boolean

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 1
      matrix:
        package:
          - name: rare-identity-protocol
            path: rare-identity-protocol-python
          - name: rare-identity-verifier
            path: rare-identity-verifier-python
          - name: rare-identity-core
            path: rare-identity-core
          - name: rare-agent-sdk
            path: rare-agent-sdk-python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Filter matrix
        id: filter
        run: |
          target='${{ github.event.inputs.target }}'
          pkg='${{ matrix.package.name }}'
          if [ "$target" = "all" ] || [ "$target" = "$pkg" ]; then
            echo "selected=true" >> "$GITHUB_OUTPUT"
          else
            echo "selected=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Install build tooling
        if: steps.filter.outputs.selected == 'true'
        run: python -m pip install -U build twine
      - name: Build distributions
        if: steps.filter.outputs.selected == 'true'
        working-directory: ${{ matrix.package.path }}
        run: python -m build
      - name: Check distributions
        if: steps.filter.outputs.selected == 'true'
        run: python -m twine check ${{ matrix.package.path }}/dist/*
      - name: Upload distributions
        if: steps.filter.outputs.selected == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.package.name }}-dist
          path: ${{ matrix.package.path }}/dist/*

  publish:
    if: github.event.inputs.publish == 'true'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    environment: ${{ github.event.inputs.repository == 'pypi' && format('pypi-{0}', matrix.package.name) || github.event.inputs.repository }}
    strategy:
      max-parallel: 1
      matrix:
        package:
          - name: rare-identity-protocol
          - name: rare-identity-verifier
          - name: rare-identity-core
          - name: rare-agent-sdk
    steps:
      - name: Filter matrix
        id: filter
        run: |
          target='${{ github.event.inputs.target }}'
          pkg='${{ matrix.package.name }}'
          if [ "$target" = "all" ] || [ "$target" = "$pkg" ]; then
            echo "selected=true" >> "$GITHUB_OUTPUT"
          else
            echo "selected=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Download distributions
        if: steps.filter.outputs.selected == 'true'
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.package.name }}-dist
          path: dist
      - name: Publish to TestPyPI
        if: steps.filter.outputs.selected == 'true' && github.event.inputs.repository == 'testpypi'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist
          skip-existing: true
      - name: Publish to PyPI
        if: steps.filter.outputs.selected == 'true' && github.event.inputs.repository == 'pypi'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          skip-existing: true
