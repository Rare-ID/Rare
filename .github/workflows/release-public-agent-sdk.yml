name: release-public-agent-sdk

on:
  workflow_run:
    workflows:
      - sync-public-oss
    types:
      - completed
  workflow_dispatch:

concurrency:
  group: release-public-agent-sdk
  cancel-in-progress: false

jobs:
  release:
    if: github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Create public SDK release when version changes
        env:
          GH_TOKEN: ${{ secrets.OSS_SYNC_TOKEN }}
          PUBLIC_REPO: Rare-ID/rare-agent-python
        run: |
          version="$(
            gh api "repos/${PUBLIC_REPO}/contents/pyproject.toml?ref=main" --jq .content \
              | tr -d '\n' \
              | base64 -d \
              | python -c 'import sys, tomllib; print(tomllib.loads(sys.stdin.read())["project"]["version"])'
          )"
          tag="v${version}"

          if gh release view "${tag}" --repo "${PUBLIC_REPO}" >/dev/null 2>&1; then
            echo "Public SDK release ${tag} already exists"
            exit 0
          fi

          gh release create "${tag}" \
            --repo "${PUBLIC_REPO}" \
            --target main \
            --title "rare-agent-sdk ${version}" \
            --notes "Automated release from Rare-Sors/Rare after public sync."
